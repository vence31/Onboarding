<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Attorney Plan Selection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin: auto;
    }

    h2 {
      margin-bottom: 20px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 25px;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #162d66;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Select Your Coverage Plan</h2>

  <div class="section">
    <label>Plan Type</label>
    <select id="planSelect">
      <option value="">-- Select Plan --</option>
      <option value="state">Single State Plan</option>
      <option value="region">Regional Plan</option>
      <option value="nation">Nationwide Plan</option>
    </select>
  </div>

  <div class="section" id="stateSection" style="display:none;">
    <label>Select State</label>
    <select id="stateSelect">
      <option value="">-- Select State --</option>
      <option value="Texas">Texas</option>
      <option value="California">California</option>
      <option value="Florida">Florida</option>
      <option value="Tennessee">Tennessee</option>
      <option value="New York">New York</option>
    </select>
  </div>

  <div class="section" id="regionSection" style="display:none;">
    <label>Select Region</label>
    <select id="regionSelect">
      <option value="">-- Select Region --</option>
      <option value="South">South</option>
      <option value="West">West</option>
      <option value="Midwest">Midwest</option>
      <option value="Northeast">Northeast</option>
    </select>
  </div>

  <button onclick="goToDashboard()">View Intake Platform</button>

</div>

<script>
  const planSelect = document.getElementById("planSelect");
  const stateSection = document.getElementById("stateSection");
  const regionSection = document.getElementById("regionSection");

  planSelect.addEventListener("change", function() {
    stateSection.style.display = "none";
    regionSection.style.display = "none";

    if (this.value === "state") {
      stateSection.style.display = "block";
    }

    if (this.value === "region") {
      regionSection.style.display = "block";
    }
  });

  function goToDashboard() {
    const plan = document.getElementById("planSelect").value;
    const state = document.getElementById("stateSelect").value;
    const region = document.getElementById("regionSelect").value;

    if (!plan) {
      alert("Please select a plan.");
      return;
    }

    if (plan === "state" && !state) {
      alert("Please select a state.");
      return;
    }

    if (plan === "region" && !region) {
      alert("Please select a region.");
      return;
    }

    const selection = {
      plan: plan,
      state: state,
      region: region
    };

    localStorage.setItem("attorneySelection", JSON.stringify(selection));

    window.location.href = "AttorneyDashboard.html";
  }
</script>

</body>
</html>
